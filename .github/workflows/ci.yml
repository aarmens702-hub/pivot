name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: cd server && npm ci

      - name: Lint
        run: npm run lint

      - name: Backend tests
        run: cd server && npm test

      - name: Frontend tests
        run: npm test

      - name: Build
        run: npm run build
